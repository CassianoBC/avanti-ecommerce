<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avanti</title>
    <link rel="shortcut icon" href="./assets/images/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="./output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito Sans', sans-serif;
        }

        .container {
            max-width: 1280px;
            width: 100%;
            margin: 0 auto;
        }
    </style>
</head>

<body>
    <div class="bg-[#005CFF] p-1">
        <div class="container">
            <p class="text-sm font-bold text-white text-center px-3">
                Ganhe <span class="bg-[#6220C1] px-0.5 rounded-sm ">R$10,00</span> de desconto no seu primeiro pedido.
                Utilize o cupom <span class="italic font-normal">DESCONTO10</span>
            </p>
        </div>
    </div>
    <header class="pt-5 pb-4.5 shadow-md">
        <div class="container px-3">
            <div class="flex justify-between items-center">
                <img class="max-w-38 mr-16.5 block" src="./assets/images/avanti_logo.png" alt="Logo da Avanti">
                <div
                    class="flex items-center justify-between mr-68.75 max-w-148.5 w-full border border-[#DDDDDD] rounded-[10px] ">
                    <input class="px-6 w-full" type="text" placeholder="Digite aqui o que você procura">
                    <button class="my-2.5 mx-4" class="cursor-pointer">
                        <img src="./assets/images/icons/search-icon.svg" alt="Ícone de busca">
                    </button>
                </div>
                <div class="flex items-center">
                    <img class="h-6 mr-2" src="./assets/images/icons/person-icon.svg" alt="Ícone de usuário">
                    <p class="text-sm leading-3.5 mr-6 font-semibold">Olá, <br> Nome cliente!</p>
                    <div class="relative">
                        <img class="h-6" src="./assets/images/icons/cart-icon.svg" alt="Ícone de carrinho">
                        <div
                            class="bg-[#005cff] rounded-full flex items-center justify-center px-2 py-0.75 text-[12px] font-semibold text-white absolute -top-2.5 -right-2.5 ">
                            <span>0</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="mt-5.75 flex items-center">
                <nav>
                    <ul class="flex gap-11.25 text-sm">
                        <li>
                            <button class="flex items-center text-center cursor-pointer">
                                <img class="mr-2" src="./assets/images/icons/menu-icon.svg" alt="Logo menu">
                                <p class="text-sm font-bold">Todas as Categorias</p>
                            </button>
                        </li>
                        <li>
                            <a href="#">Departamento</a>
                        </li>
                        <li>
                            <a href="#">Departamento</a>
                        </li>
                        <li>
                            <a href="#">Departamento</a>
                        </li>
                        <li>
                            <a href="#">Departamento</a>
                        </li>
                        <li>
                            <a href="#">Departamento</a>
                        </li>
                        <li>
                            <a href="#">Departamento</a>
                        </li>
                        <li>
                            <a href="#">Departamento</a>
                        </li>
                        <li>
                            <a href="#">Departamento</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>
    <div class="bg-[#EBEBEB]">
        <div class="container flex justify-center">
            <img class="max-w-171.25 block" src="./assets/images/hero-img.jpg" alt="Imagem do hero">
            <div class="flex flex-col justify-center">
                <h1 class="text-[100px] font-light"><b class="font-bold uppercase">SUPER</b>SALE</h1>
                <p class="text-[25px] font-bold text-[#005CFF] tracking-[30%] uppercase">Itens selecionados com até</p>
                <h2 class="text-[60px] font-bold uppercase text-center text-[#005CFF]">50%off</h2>
            </div>
        </div>
    </div>

</body>

</html>
